<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Forgot Password</title>
	<link rel="icon" type="image/png" href="../images/pawpal.png">
	<link rel="stylesheet" type="text/css" href="../style/forgotstyle.css">
	<script src="../js/forgotscript.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="form-container">
        <h2>Password Reset</h2>
    <form>
       Email:<input type="email" id="email" placeholder="Enter Your Email"><br><br>
        New Password: <input type="password" id="npassword" placeholder="Enter New Password"><br><br>
       Confirm Password: <input type="password" id="cpassword"><br><br>
    <button type="button" class="submit" onclick="forgot()">Submit</button>
    </form>
    </div>
</body>
</html>
