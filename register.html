<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Registration</title>
	<link rel="stylesheet" type="text/css" href="style/registerstyle.css">
</head>
<body>
	<h1>Sign Up or Registration form</h1>
    <div class="container">
		
		<script>
		function data()
		{
		var fn=document.getElementById('fname').value;
		var ln=document.getElementById('lname').value;
		var contact=document.getElementById('contact').value;
		var pw=document.getElementById('pw').value;
		var cpw=document.getElementById('cpw').value;
		if (fn==""||ln==""|| contact==""|| pw==""|| cpw=="")
		 {
		 	alert("All Fields are mandatory");
		 	return false;
		 }
		 else if(pw!=cpw)
		 {
		 	alert("Password don't match. Please, Enter same Password");
		 	return false;
		 }
		 else
		 {
		 	return true;
		 }
		}
	</script>
	<form onsubmit="return data()" action="insert.php" method="POST">
		First Name: <br>    <input type="text" id="fname" name="fname" placeholder="Enter Your First Name"><br><br>
		Last Name:  <br>      <input type="text" id="lname" name="lname" placeholder="Enter Your Last Name"><br><br>
		Contact:    <br>        <input type="tel" id="contact" name="contact" placeholder="Enter Your Contact Number" pattern="9[78][0-9]{8}"><br><br>
		Email:     <br>         <input type="email" id="email" name="email" placeholder="Enter Your Email"><br><br>
		Password:  <br>         <input type="password" id="pw" name="pw"><br><br>
		Confirm Password: <br>  <input type="password" id="cpw" name="cpw"><br><br>
		<input type="submit" class="submit" value="Submit">

		<button class="login-btn" onclick="data()"><a href="login.html">Login</a></button>
	</form>
    </div>
</body>
</html>
